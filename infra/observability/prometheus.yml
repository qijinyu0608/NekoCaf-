global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: nekocafe-web
    metrics_path: /metrics
    static_configs:
      - targets:
          - app:8000
  - job_name: nekocafe-service-poc
    metrics_path: /metrics
    static_configs:
      - targets:
          - reservation-service:8001
          - member-service:8002
