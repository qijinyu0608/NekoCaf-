name: CI

on:
  push:
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run unit tests
        run: pytest -q

      - name: Validate docker compose config
        run: docker compose config

  helm-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: |
          helm lint project/infra/helm
          helm lint project/infra/helm -f project/infra/helm/values-dev.yaml
          helm lint project/infra/helm -f project/infra/helm/values-staging.yaml
          helm lint project/infra/helm -f project/infra/helm/values-prod.yaml
