services:
  reservation:
    build:
      context: .
      dockerfile: infra/docker/reservation.Dockerfile
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 3
  member:
    build:
      context: .
      dockerfile: infra/docker/member.Dockerfile
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 3
