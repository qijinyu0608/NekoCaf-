global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: member-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - member:8002
  - job_name: reservation-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - reservation:8001
